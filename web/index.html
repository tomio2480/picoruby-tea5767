<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>FM スペクトラムモニタ (v0.1)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./assets/style.css">
</head>
<body>
<header>
  <h1>FM スペクトラムモニタ</h1>
  <p class="subtitle">PicoRuby + TEA5767 + Ruby.wasm</p>
</header>

<main>
  <section id="control-section">
    <h2>コントロール</h2>
    <p class="controls">
      <label>
        地域:
        <select id="region">
          <option value="hakodate">函館市</option>
        </select>
      </label>
      <button type="button" id="start-mock">モックスキャン開始</button>
      <button type="button" id="connect-pico">Pico に接続</button>
      <span id="scan-status">待機中</span>
    </p>
  </section>

  <section id="spectrum-section">
    <h2>スペクトラム</h2>
    <canvas id="spectrum" width="800" height="300"></canvas>
  </section>

  <section id="peak-section">
    <h2>検出局</h2>
    <table id="peak-table">
      <thead>
        <tr><th>周波数</th><th>RSSI</th><th>局名</th></tr>
      </thead>
      <tbody id="peak-tbody">
        <tr><td colspan="3">スキャン未実行</td></tr>
      </tbody>
    </table>
  </section>

  <section id="status-section">
    <h2>起動状態</h2>
    <div id="status" class="status loading">Ruby.wasm を読み込み中…</div>
  </section>
</main>

<footer>
  <small>両端 Ruby で書かれた FM スペクトラムモニタ．ブラウザ側は Ruby.wasm．</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@ruby/4.0-wasm-wasi@2.9.3-2.9.4/dist/browser.script.iife.js" integrity="sha384-PgjkYoQ9PD2oceQoBy8mqfDNIbZatLeZiWG+kBfAKKVwWmf6ILeHDVP89CymeIlr" crossorigin="anonymous"></script>
<script type="text/ruby" data-eval="async" src="./lib/protocol.rb"></script>
<script type="text/ruby" data-eval="async" src="./lib/aggregator.rb"></script>
<script type="text/ruby" data-eval="async" src="./lib/peak_detector.rb"></script>
<script type="text/ruby" data-eval="async" src="./lib/station_directory.rb"></script>
<script type="text/ruby" data-eval="async" src="./lib/mock_source.rb"></script>
<script type="text/ruby" data-eval="async" src="./lib/canvas_renderer.rb"></script>
<script type="text/ruby" data-eval="async" src="./lib/mock_stream.rb"></script>
<script type="text/ruby" data-eval="async" src="./lib/serial_client.rb"></script>
<script type="text/ruby" data-eval="async" src="./app.rb"></script>
</body>
</html>
